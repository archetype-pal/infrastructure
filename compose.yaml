name: archetype
services:
  meilisearch:
    image: getmeili/meilisearch:latest
    environment:
      - MEILI_ENV=development
    # No MEILI_MASTER_KEY in development: requests without a key are allowed.
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18.3-bookworm}
    volumes:
      # PostgreSQL 18 Docker images use versioned PGDATA under /var/lib/postgresql.
      # Keep the volume mounted at the parent so future major upgrades can use
      # the official versioned layout.
      - postgres18:/var/lib/postgresql
    environment:
      - POSTGRES_HOST=localhost
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-local}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - PGDATA=/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    image: ghcr.io/archetype-pal/backend:latest
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      MEILISEARCH_URL: http://meilisearch:7700
    env_file: env_file
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
      redis:
        condition: service_healthy
  frontend:
    image: ghcr.io/archetype-pal/frontend:dev
    volumes:
      - ../frontend:/app
      - next_build:/app/.next
    env_file: env_file
    depends_on:
      - api
  image_server:
    image: daschswiss/sipi
    user: "14:50"
    ports:
      - 1024:1024
    volumes:
      - ./storage/media:/sipi/images
      - ./sipi-config/sipi.config.lua:/sipi/config/sipi.config.lua:ro
      - ./sipi-config/sipi.init.lua:/sipi/config/sipi.init.lua:ro
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    env_file: env_file
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./certs:/etc/nginx/certs:ro
      - ./html:/var/www/certbot:ro
      - ./nginx-entrypoint.sh:/docker-entrypoint.d/nginx-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint.d/nginx-entrypoint.sh"]
    depends_on:
      - api
  certbot:
    image: certbot/certbot
    volumes:
      - ./certs:/etc/letsencrypt
      - ./html:/var/www/certbot
      - ./logs:/var/log/letsencrypt
    depends_on:
      - nginx
  # ftp:
  #   image: fauria/vsftpd
  #   restart: always
  #   env_file: env_file
  #   ports:
  #     - "21:21"
  #     - "21100-21110:21100-21110"
  #   volumes:  # make sure to update archetype_user below to match the user in the env_file 
  #     - ./storage/media:/home/vsftpd/archetype_user

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 30s
      retries: 50

  celery:
    image: ghcr.io/archetype-pal/backend:latest
    command: celery -A config worker -l info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
    env_file: env_file
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MEILISEARCH_URL=http://meilisearch:7700
volumes:
  postgres18:
  logs:
  meilisearch_data:
  next_build:
  redis_data:
