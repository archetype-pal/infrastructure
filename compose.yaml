name: archetype
services:
  meilisearch:
    image: getmeili/meilisearch:latest
    environment:
      - MEILI_ENV=development
    # No MEILI_MASTER_KEY in development: requests without a key are allowed.
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18.3-bookworm}
    volumes:
      # PostgreSQL 18 Docker images use versioned PGDATA under /var/lib/postgresql.
      # Keep the volume mounted at the parent so future major upgrades can use
      # the official versioned layout.
      - postgres18:/var/lib/postgresql
    environment:
      - POSTGRES_HOST=localhost
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-local}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - PGDATA=/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    image: ghcr.io/archetype-pal/backend:latest
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      MEILISEARCH_URL: http://meilisearch:7700
    env_file: env_file
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
      redis:
        condition: service_healthy
  frontend:
    image: ghcr.io/archetype-pal/frontend:dev
    volumes:
      - ../frontend:/app
      - next_build:/app/.next
    env_file: env_file
    depends_on:
      - api
  image_server:
    image: daschswiss/sipi
    user: "14:50"
    ports:
      - 1024:1024
    volumes:
      - ./storage/media:/sipi/images
      - ./sipi-config/sipi.config.lua:/sipi/config/sipi.config.lua:ro
      - ./sipi-config/sipi.init.lua:/sipi/config/sipi.init.lua:ro
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    env_file: env_file
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./certs:/etc/nginx/certs:ro
      - ./html:/var/www/certbot:ro
      - ./nginx-entrypoint.sh:/docker-entrypoint.d/nginx-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint.d/nginx-entrypoint.sh"]
    depends_on:
      - api
  certbot:
    image: certbot/certbot
    volumes:
      - ./certs:/etc/letsencrypt
      - ./html:/var/www/certbot
      - ./logs:/var/log/letsencrypt
    depends_on:
      - nginx
  # ftp:
  #   image: fauria/vsftpd
  #   restart: always
  #   env_file: env_file
  #   ports:
  #     - "21:21"
  #     - "21100-21110:21100-21110"
  #   volumes:  # make sure to update archetype_user below to match the user in the env_file 
  #     - ./storage/media:/home/vsftpd/archetype_user

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 30s
      retries: 50

  celery:
    image: ghcr.io/archetype-pal/backend:latest
    command: celery -A config worker -l info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
    env_file: env_file
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MEILISEARCH_URL=http://meilisearch:7700
    # `inspect ping` is Celery's canonical liveness probe — it round-trips
    # through the broker and the worker's mingle queue, so a green check
    # means "worker is consuming tasks", not just "process exists". `-d`
    # targets THIS container's worker name; `$$HOSTNAME` is escaped so
    # docker-compose passes a literal `$HOSTNAME` for the shell to expand
    # inside the container.
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Periodic logical backup of the application database. Runs in-process
  # (no host cron / no Kubernetes CronJob assumed) and writes compressed
  # dumps to a host-mounted `./backups/` directory so operators can pull
  # them off the box without entering the container.
  #
  # Retention: 14 days. Schedule: once every 24h after a one-minute warm-up
  # so a stack restart doesn't immediately re-dump.
  #
  # See infrastructure/docs/backup-runbook.md for restore steps and the
  # off-site copy policy.
  pg_backup:
    image: postgres:alpine
    env_file: env_file
    command:
      - sh
      - -c
      - |
        set -eu
        sleep 60
        mkdir -p /backups
        while true; do
          ts="$$(date -u +%Y%m%dT%H%M%SZ)"
          out="/backups/local-$$ts.sql.gz"
          echo "[pg_backup] starting dump → $$out"
          if pg_dump "$$DATABASE_URL" | gzip > "$$out.partial"; then
            mv "$$out.partial" "$$out"
            echo "[pg_backup] OK $$(wc -c < "$$out") bytes"
          else
            echo "[pg_backup] FAILED — leaving .partial for inspection" >&2
            rm -f "$$out.partial" || true
          fi
          find /backups -name 'local-*.sql.gz' -mtime +14 -delete
          sleep 86400
        done
    volumes:
      - ./backups:/backups
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres18:
  logs:
  meilisearch_data:
  next_build:
  redis_data:
